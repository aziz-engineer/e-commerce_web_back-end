<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - ShopAPI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .bg-grid {
      background-image: linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .delay-1 { animation-delay: 0.1s; opacity:0; }
    .delay-2 { animation-delay: 0.2s; opacity:0; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 bg-grid flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <div class="text-center mb-8 fade-up">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-500/30">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-black text-white tracking-tight">ShopAPI</h1>
      <p class="text-slate-400 text-sm mt-1">Créer un nouveau compte</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl fade-up delay-1">
      <h2 class="text-xl font-bold text-white mb-1">Inscription </h2>
      <p class="text-slate-400 text-sm mb-6">Créez votre compte et commencez vos achats</p>

      <div id="msg" class="hidden mb-4 px-4 py-3 rounded-xl text-sm font-semibold"></div>

      <form onsubmit="doRegister(event)" class="space-y-4 fade-up delay-2">
        <div>
          <label class="block text-slate-300 text-sm font-semibold mb-2">Nom complet</label>
          <input type="text" id="name"
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all text-sm"
            placeholder="Votre nom complet" required>
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-semibold mb-2">Adresse e-mail</label>
          <input type="email" id="email"
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all text-sm"
            placeholder="votre@email.com" required>
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-semibold mb-2">Mot de passe</label>
          <input type="password" id="password"
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all text-sm"
            placeholder="••••••••" required>
        </div>  
        <button type="submit"
          class="w-full bg-gradient-to-r from-green-500 to-teal-600 hover:from-green-400 hover:to-teal-500 text-white font-bold py-3 rounded-xl mt-2 transition-all duration-300 hover:scale-[1.02]">
          S'inscrire
        </button>
      </form>
        <p class="text-center text-slate-600 text-xs mt-6">
            Vous avez déjà un compte ? <a href="login.html" class="text-indigo-500 hover:underline font-semibold">Se connecter</a>
        </p>
     </div>
        <p class="text-center text-slate-600 text-xs mt-6">ShopAPI © 2026 </p>
    </div>

    
  </div>
</body>
</html>
