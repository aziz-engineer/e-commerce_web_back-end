<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .bg-grid {
      background-image: linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .delay-1 { animation-delay: 0.1s; opacity:0; }
    .delay-2 { animation-delay: 0.2s; opacity:0; }
    .delay-3 { animation-delay: 0.3s; opacity:0; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 bg-grid flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8 fade-up">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-500/30">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-black text-white tracking-tight">Shop  </h1>
      <p class="text-slate-400 text-sm mt-1">Tableau de bord e-commerce</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl fade-up delay-1">
      <h2 class="text-xl font-bold text-white mb-1">Bienvenue 👋</h2>
      <p class="text-slate-400 text-sm mb-6">Connectez-vous pour continuer</p>

      <!-- Error/Success msg -->
      <div id="msg" class="hidden mb-4 px-4 py-3 rounded-xl text-sm font-semibold"></div>

      <form id="loginForm" class="space-y-4" onsubmit="doLogin(event)">
        <div class="fade-up delay-2">
          <label class="block text-slate-300 text-sm font-semibold mb-2">Adresse e-mail</label>
          <input type="email" id="email" value="admin@test.com"
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all text-sm"
            placeholder="email@example.com" required>
        </div>
        <div class="fade-up delay-2">
          <label class="block text-slate-300 text-sm font-semibold mb-2">Mot de passe</label>
          <input type="password" id="password" value="123456"
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all text-sm"
            placeholder="••••••••" required>
        </div>

        <div class="fade-up delay-3 pt-2">
          <button type="submit" id="btn"
            class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-all duration-200 shadow-lg shadow-indigo-500/30 hover:shadow-indigo-500/50 hover:-translate-y-0.5 active:translate-y-0 text-sm">
            Se connecter
          </button>
        </div>
      </form>

      <!-- Token display -->
      <div id="tokenBox" class="hidden mt-4 p-3 bg-green-950 border border-green-800 rounded-xl">
        <p class="text-green-400 text-xs font-semibold mb-1">✓ Token enregistré :</p>
        <p id="tokenVal" class="text-green-300 text-xs break-all font-mono"></p>
      </div>

      <p class="text-center text-slate-500 text-sm mt-6">
        Vous n'avez pas de compte ?
        <a href="register.html" class="text-indigo-400 font-semibold hover:text-indigo-300 transition-colors">Inscrivez-vous maintenant</a>
      </p>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">Shop © 2026 —</p>
  </div>

  
</body>
</html>
